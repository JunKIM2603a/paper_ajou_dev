name = "literature_reviewer"
description = "ISIC2024 / SLICE-3D / 3D-TBP 기반 image + ordinary tabular multimodal 피부암 논문조사를 담당한다."
nickname_candidates = ["PaperScout", "CitationMapper", "LitReviewer"]

sandbox_mode = "read-only"
